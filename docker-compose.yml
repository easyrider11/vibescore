version: "3.9"

services:
  web:
    build: .
    environment:
      DATABASE_URL: file:./dev.db
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.2-codex}
      AI_MODE: ${AI_MODE:-mock}
    ports:
      - "3000:3000"
    command: sh -c "npx prisma db push && npx prisma db seed && npm run start"

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # Fake URL for Prisma generate + Next.js build (no actual DB connection needed)
  DATABASE_URL: "postgresql://user:pass@localhost:5432/ci?schema=public"
  DIRECT_URL: "postgresql://user:pass@localhost:5432/ci?schema=public"

jobs:
  test-and-build:
    name: Test & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run tests
        run: npx vitest run

      - name: Build
        run: npx next build
